name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.5.0)'
        required: false
        default: '0.5.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements-lite.txt

    - name: Get version
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Build executable
      run: |
        python build.py
      env:
        PYTHONPATH: .
        BUILD_VERSION: ${{ steps.version.outputs.VERSION }}

    - name: Create release package
      shell: bash
      run: |
        cd release
        7z a -tzip ../mirolaw-${{ steps.version.outputs.VERSION }}-x64-Windows.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirolaw-windows
        path: release/

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/mirolaw-${{ steps.version.outputs.VERSION }}-x64-Windows.exe
          mirolaw-${{ steps.version.outputs.VERSION }}-x64-Windows.zip
        body: |
          ## MiroLaw v${{ steps.version.outputs.VERSION }}

          ### Download
          | File | Description |
          |------|-------------|
          | `mirolaw-${{ steps.version.outputs.VERSION }}-x64-Windows.exe` | Single file, run directly |
          | `mirolaw-${{ steps.version.outputs.VERSION }}-x64-Windows.zip` | Full release package |

          ### Usage
          1. Download the exe file
          2. Double-click to run
          3. Browser opens http://localhost:8000 automatically

          ### Features
          - **Risk Prediction**: Detect compliance risks in product descriptions
          - **Real-time Alerts**: WebSocket push notifications
          - **Legal Search**: Search relevant laws and regulations
          - **Case Library**: View typical violation cases
          - **Fine Prediction**: Estimate potential fines
          - **AI Suggestions**: Generate remediation plans

          ### Docs
          - [README](https://github.com/23xxCh/Mirolaw#readme)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
